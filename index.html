<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>無雙暗棋 (Wushuang Dark Chess)</title>
    <link rel="stylesheet" href="style.css?v=5">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Outfit:wght@300;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app">
        <!-- 起始頁面 -->
        <section id="start-page">
            <header class="hero-header">
                <h1>無雙暗棋</h1>
                <p class="hero-subtitle">蛻變。棋力覺醒</p>
            </header>
            <div class="menu-container">
                <button id="normal-mode-btn" class="btn menu-btn primary">一般模式</button>
                <button id="wushuang-mode-btn" class="btn menu-btn secondary">國士無雙模式</button>
                <button id="sandbox-mode-btn" class="btn menu-btn secondary">測試模式</button>
                <button id="open-guide-btn" class="btn menu-btn secondary">玩法說明</button>
            </div>
        </section>

        <!-- 自訂測試棋盤頁面 -->
        <section id="sandbox-page" class="hidden">
            <div class="sandbox-header">
                <button id="back-from-sandbox" class="btn secondary">← 返回主選單</button>
                <h2>🧪 自訂測試棋盤</h2>
                <button id="clear-sandbox" class="btn secondary">清空棋盤</button>
            </div>
            <div class="sandbox-layout">
                <div class="sandbox-palette">
                    <div class="palette-section">
                        <div class="palette-side-label red-label">🔴 紅方</div>
                        <div class="palette-pieces" id="red-palette"></div>
                    </div>
                    <div class="palette-divider"></div>
                    <div class="palette-section">
                        <div class="palette-side-label black-label">⚫ 黑方</div>
                        <div class="palette-pieces" id="black-palette"></div>
                    </div>
                    <div class="palette-tools">
                        <button id="palette-eraser" class="btn secondary">🗑️ 橡皮擦</button>
                        <button id="sandbox-load-game" class="btn primary">▶ 載入至主遊戲</button>
                    </div>
                    <div class="palette-hint">
                        <p>左鍵：放置 / 再點移除</p>
                        <p>右鍵：切換升級狀態 ✨</p>
                    </div>
                </div>
                <div id="sandbox-board" class="board"></div>
            </div>
        </section>

        <!-- 玩法說明頁面 (預設隱藏) -->
        <section id="guide-page" class="hidden">
            <div class="guide-header">
                <button id="back-to-menu" class="btn secondary">← 返回主選單</button>
                <h2>棋子技能指南</h2>
            </div>

            <div class="guide-content">
                <div id="guide-list"></div>
            </div>
        </section>

        <main id="main-game" class="hidden">
            <div class="game-container">
                <!-- 狀態顯示欄 -->
                <div class="status-bar">
                    <div id="turn-indicator" class="turn-red">
                        <span class="indicator-dot"></span>
                        <span class="turn-text">紅方回合</span>
                    </div>
                    <div class="game-info">
                        <span id="game-mode-display">人 vs AI (業餘)</span>
                    </div>
                </div>

                <!-- 棋盤區 -->
                <div id="board" class="board">
                    <!-- 棋子將由 JS 生成 -->
                </div>

                <!-- 底部控制區 (簡化後) -->
                <div class="controls">
                    <button id="undo-btn" class="btn primary">悔棋</button>
                    <button id="reset-btn" class="btn secondary">重新開始</button>
                    <button id="back-to-menu-from-game" class="btn secondary">主選單</button>
                    <button id="return-sandbox-btn" class="btn secondary hidden">返回測試模式</button>
                </div>
            </div>

            <!-- 側邊欄：吃子紀錄 (墳場) -->
            <aside class="graveyard-container">
                <div class="graveyard-section red-side">
                    <h3>紅方戰利品</h3>
                    <div id="red-captured" class="captured-list"></div>
                </div>
                <div class="graveyard-section black-side">
                    <h3>黑方戰利品</h3>
                    <div id="black-captured" class="captured-list"></div>
                </div>
            </aside>
        </main>

        <!-- 重複棋步警告彈窗 -->
        <div id="repetition-modal" class="modal hidden">
            <div class="modal-content warning-modal">
                <div class="warning-icon">⚠️</div>
                <h2>禁手警告</h2>
                <p id="repetition-msg">同樣的棋步已連續使用 3 次！<br>不可再重複此棋步，請改走其他棋路。</p>
                <button id="close-repetition" class="btn primary">我知道了</button>
            </div>
        </div>

        <!-- 設定彈窗 (現在作為進入遊戲前的必要步驟) -->
        <div id="settings-modal" class="modal hidden">
            <div class="modal-content">
                <h2>遊戲設定</h2>
                <div class="setting-group">
                    <label>對戰模式</label>
                    <select id="mode-select">
                        <option value="pvp">人 vs 人 (同機)</option>
                        <option value="pve" selected>人 vs AI</option>
                    </select>
                </div>
                <div class="setting-group" id="ai-difficulty-group">
                    <label>AI 難度</label>
                    <select id="difficulty-select">
                        <option value="novice">超簡單</option>
                        <option value="amateur" selected>簡單</option>
                        <option value="pro">中等</option>
                        <option value="god">困難</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>音效開關</label>
                    <label class="toggle-switch" id="sound-toggle-label">
                        <input type="checkbox" id="sound-toggle" checked>
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <button id="start-game-confirm" class="btn primary">開始遊戲</button>
                <button id="cancel-settings" class="btn secondary">取消</button>
            </div>
        </div>
    </div>

    <script src="game.js?v=5"></script>

</body>

</html>
